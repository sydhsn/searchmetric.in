<!-- TechMinds Solution Logo | Modern, minimal, digital style -->
<svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="220" height="60" rx="16" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="220" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="220" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff"/>
      <stop offset="1" stop-color="#F3F4F6"/>
    </linearGradient>
  </defs>
  <text x="28" y="38" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#text)">
    TechMinds
  </text>
  <text x="155" y="52" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="500" fill="#F3F4F6" letter-spacing="0.04em">
    Solution
  </text>
  <!-- Digital accent: clean dot and square -->
  <circle cx="128" cy="24" r="5" fill="#EC4899"/>
  <rect x="122" y="18" width="10" height="10" rx="3" fill="#6366F1" opacity="0.8"/>
</svg>
